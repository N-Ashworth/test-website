<!DOCTYPE html>
<html>
<head>
    <title>Creature Encyclopedia</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body>
    <input type="text" id="search" name="search" class="search" placeholder="Search...">
    
    <div>
        <h1>Create a Creature:</h1>
        
        <div>
            <label for="cr_name">Name:</label>
            <input type="text" id="cr_name" name="creature-name" placeholder="Sprite"><br>

            <label for="cr_habitat">Habitat:</label>
            <input type="text" id="cr_habitat" name="creature-habitat" placeholder="Forest"><br>

            <label for="cr_danger">Danger:</label>
            <input type="number" id="cr_danger" name="creature-danger" min="1" max="10" step="1" /><br><br>

            <button id="add-creature">Add Creature</button>
        </div>

        <h2 id="creature-counter">0 creatures added</h2>
        <div class="creature-list" id="creature-list">
        </div>
    </div>
</body>
</html>
